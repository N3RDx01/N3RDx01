name: Update Kaggle Stats

on:
  schedule:
    - cron: '0 0 * * *'  # Runs automatically every day at midnight UTC
  workflow_dispatch:     # Allows you to trigger it manually anytime

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate Kaggle Stats Card
        uses: kshitijzutshi/kaggle-readme-action@v2.0
        env:
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        with:
          kaggle_username: "n3rdx01" # Your exact public Kaggle username

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Automated update of Kaggle statistics" || exit 0
          git push
